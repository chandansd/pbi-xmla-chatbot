<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Employee Burnout Chatbot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Header */
    header {
      background: #1a1d27;
      border-bottom: 1px solid #2a2d3e;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header .logo { font-size: 22px; }
    header h1 { font-size: 17px; font-weight: 600; color: #fff; }
    header span { font-size: 12px; color: #6b7280; margin-left: auto; }

    /* Chat area */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .msg { display: flex; gap: 12px; max-width: 860px; width: 100%; }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .msg.user .avatar  { background: #3b5bdb; }
    .msg.bot  .avatar  { background: #1e293b; border: 1px solid #2a2d3e; }

    .bubble {
      background: #1a1d27;
      border: 1px solid #2a2d3e;
      border-radius: 12px;
      padding: 12px 16px;
      font-size: 14px;
      line-height: 1.6;
      max-width: 720px;
    }
    .msg.user .bubble {
      background: #1e3a8a;
      border-color: #2563eb;
    }

    .bubble p { margin-bottom: 8px; }
    .bubble p:last-child { margin-bottom: 0; }

    /* Data table inside bubble */
    .data-table-wrap {
      margin-top: 12px;
      overflow-x: auto;
      border-radius: 8px;
      border: 1px solid #2a2d3e;
    }
    .data-table {
      width: 100%; border-collapse: collapse; font-size: 12px;
    }
    .data-table th {
      background: #0f1117; color: #94a3b8;
      padding: 7px 12px; text-align: left;
      border-bottom: 1px solid #2a2d3e; white-space: nowrap;
    }
    .data-table td {
      padding: 6px 12px; border-bottom: 1px solid #1e2133;
      color: #cbd5e1;
    }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: #1e2133; }

    /* DAX toggle */
    .dax-toggle {
      margin-top: 10px; font-size: 12px; color: #6b7280;
      cursor: pointer; user-select: none;
    }
    .dax-toggle:hover { color: #94a3b8; }
    .dax-block {
      margin-top: 6px; background: #0f1117; border: 1px solid #2a2d3e;
      border-radius: 6px; padding: 10px; font-family: monospace;
      font-size: 12px; color: #7dd3fc; white-space: pre-wrap;
      display: none;
    }
    .row-count { font-size: 11px; color: #6b7280; margin-top: 6px; }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 5px; padding: 4px 0; }
    .typing span {
      width: 7px; height: 7px; background: #6b7280; border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .2; }
      40%            { opacity: 1; }
    }

    /* Input bar */
    #input-bar {
      background: #1a1d27;
      border-top: 1px solid #2a2d3e;
      padding: 16px 24px;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1; background: #0f1117; color: #e8eaf0;
      border: 1px solid #2a2d3e; border-radius: 10px;
      padding: 10px 14px; font-size: 14px; resize: none;
      outline: none; max-height: 140px; overflow-y: auto;
      font-family: inherit; line-height: 1.5;
    }
    #user-input:focus { border-color: #3b5bdb; }
    #user-input::placeholder { color: #4b5563; }

    #send-btn {
      background: #3b5bdb; color: #fff; border: none;
      border-radius: 10px; padding: 10px 18px; font-size: 14px;
      cursor: pointer; white-space: nowrap; font-weight: 500;
      transition: background .15s;
    }
    #send-btn:hover:not(:disabled)  { background: #2f4ac5; }
    #send-btn:disabled { background: #1e293b; color: #4b5563; cursor: default; }

    /* Suggestions */
    #suggestions {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 24px 14px;
    }
    .chip {
      background: #1a1d27; border: 1px solid #2a2d3e;
      border-radius: 20px; padding: 5px 13px; font-size: 12px;
      color: #94a3b8; cursor: pointer; transition: border-color .15s;
    }
    .chip:hover { border-color: #3b5bdb; color: #e8eaf0; }
  </style>
</head>
<body>

<header>
  <div class="logo">🔥</div>
  <h1>Employee Burnout Chatbot</h1>
  <span>Powered by GPT + Power BI XMLA</span>
</header>

<div id="chat"></div>

<div id="suggestions">
  <div class="chip" onclick="ask(this)">What is the overall burnout rate?</div>
  <div class="chip" onclick="ask(this)">Which job role has highest burnout?</div>
  <div class="chip" onclick="ask(this)">Burnout rate by gender</div>
  <div class="chip" onclick="ask(this)">Top 5 stress categories by burnout</div>
  <div class="chip" onclick="ask(this)">How does remote work affect burnout?</div>
  <div class="chip" onclick="ask(this)">Show avg work hours by experience level</div>
</div>

<div id="input-bar">
  <textarea id="user-input" rows="1" placeholder="Ask anything about employee burnout…"></textarea>
  <button id="send-btn" onclick="sendMessage()">Send</button>
</div>

<script>
  const chatEl  = document.getElementById('chat');
  const inputEl = document.getElementById('user-input');
  const sendBtn = document.getElementById('send-btn');
  let history   = [];

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function ask(chip) {
    inputEl.value = chip.textContent;
    sendMessage();
  }

  function appendMsg(role, html) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const avatar = role === 'user' ? '👤' : '🤖';
    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="bubble">${html}</div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function typingIndicator() {
    return appendMsg('bot',
      '<div class="typing"><span></span><span></span><span></span></div>');
  }

  function renderAnswer(data) {
    const answer = (data.answer || '').trim()
      .replace(/\n\n/g, '</p><p>')
      .replace(/\n/g, '<br>');

    let html = `<p>${answer}</p>`;

    if (data.preview && data.preview.length > 0) {
      const cols = Object.keys(data.preview[0]);
      const header = cols.map(c => `<th>${c.replace(/^\[|\]$/g,'')}</th>`).join('');
      const bodyRows = data.preview.map(row =>
        `<tr>${cols.map(c => `<td>${row[c] ?? ''}</td>`).join('')}</tr>`
      ).join('');
      html += `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr>${header}</tr></thead>
            <tbody>${bodyRows}</tbody>
          </table>
        </div>`;
      if (data.rowCount > data.preview.length)
        html += `<div class="row-count">Showing ${data.preview.length} of ${data.rowCount} rows</div>`;
    }

    if (data.dax) {
      const id = 'dax_' + Date.now();
      html += `
        <div class="dax-toggle" onclick="toggleDax('${id}')">▶ Show DAX query</div>
        <pre class="dax-block" id="${id}">${escHtml(data.dax)}</pre>`;
    }
    return html;
  }

  function toggleDax(id) {
    const el  = document.getElementById(id);
    const btn = el.previousElementSibling;
    if (el.style.display === 'block') {
      el.style.display = 'none'; btn.textContent = '▶ Show DAX query';
    } else {
      el.style.display = 'block'; btn.textContent = '▼ Hide DAX query';
    }
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = ''; inputEl.style.height = 'auto';
    sendBtn.disabled = true;
    document.getElementById('suggestions').style.display = 'none';

    appendMsg('user', escHtml(text));
    const loader = typingIndicator();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text, history })
      });
      const data = await res.json();

      loader.remove();
      appendMsg('bot', renderAnswer(data));

      history.push({ role: 'user',      content: text });
      history.push({ role: 'assistant', content: data.answer || '' });
      if (history.length > 20) history = history.slice(-20);

    } catch (err) {
      loader.remove();
      appendMsg('bot', `<p style="color:#f87171">Error: ${err.message}</p>`);
    }

    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
